<main class="container">
  <mat-stepper [selectedIndex]="step()">
    <mat-step>
      <ng-template matStepLabel>Upload XML File with Books</ng-template>
      <div class="step-body">
        <app-xml-parser-form #xmlParserForm (submitted)="nextStep()"></app-xml-parser-form>
      </div>
      <div class="step-actions">
        <button matButton="text" type="button" (click)="xmlParserForm.onReset()">Reset</button>
        <button matButton="filled" type="button" (click)="xmlParserForm.onSubmit()">Submit</button>
      </div>
    </mat-step>
    <mat-step>
      <ng-template matStepLabel>Edit Books Data</ng-template>
      <div class="step-body">
        <app-books-table (empty)="onReset()"></app-books-table>
      </div>
      <div class="step-actions">
        <button matButton="text" matStepperPrevious>Back</button>
        <button matButton="text" (click)="onReset()">Reset</button>
        <button matButton="filled">Download</button>
      </div>
    </mat-step>
  </mat-stepper>
</main>
